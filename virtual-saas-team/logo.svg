<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <style>
      .hex-outline { stroke: #94A3B8; stroke-width: 1.2; fill: none; }
      .node { fill: url(#nodeGrad); }
      .center { fill: url(#centerGrad); }
      .connector { stroke: #94A3B8; stroke-width: 1; opacity: 0.3; }
      .text { font-family: 'Montserrat', 'Poppins', 'Segoe UI', sans-serif; font-size: 28px; font-weight: 500; fill: #0F172A; letter-spacing: -0.02em; }
    </style>
  </defs>
  <!-- Icon group at (45,30) -->
  <g id="hex-icon" transform="translate(45,30)">
    <polygon points="20,0 37,11 37,29 20,40 3,29 3,11" class="hex-outline"/>
    <line x1="20" y1="20" x2="20" y2="0" class="connector"/>
    <line x1="20" y1="20" x2="37" y2="11" class="connector"/>
    <line x1="20" y1="20" x2="37" y2="29" class="connector"/>
    <line x1="20" y1="20" x2="20" y2="40" class="connector"/>
    <line x1="20" y1="20" x2="3" y2="29" class="connector"/>
    <line x1="20" y1="20" x2="3" y2="11" class="connector"/>
    <circle cx="20" cy="0" r="3.5" class="node"/>
    <circle cx="37" cy="11" r="3.5" class="node"/>
    <circle cx="37" cy="29" r="3.5" class="node"/>
    <circle cx="20" cy="40" r="3.5" class="node"/>
    <circle cx="3" cy="29" r="3.5" class="node"/>
    <circle cx="3" cy="11" r="3.5" class="node"/>
    <circle cx="20" cy="20" r="5" class="center"/>
  </g>
  <!-- Text now much closer: x="90" instead of 120 -->
  <text x="90" y="57" class="text">Virtual SaaS Team</text>
</svg>
